<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC Travelling - Registro</title>

  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />

  <link rel="stylesheet" href="assets/css/registro.css" />
</head>
<body>
  <main class="page">
    <section class="card-wrap">

      <div class="timeline" aria-hidden="true">
        <div class="line"></div>

        <span class="dot gold" style="top: 7%;"></span>
        <span class="dot gold" style="top: 15%;"></span>
        <span class="dot navy" style="top: 23%;"></span>
        <span class="dot gold" style="top: 33%;"></span>
        <span class="dot navy" style="top: 43%;"></span>
        <span class="dot gold" style="top: 56%;"></span>
        <span class="dot navy" style="top: 69%;"></span>
        <span class="dot gold" style="top: 82%;"></span>
        <span class="dot navy" style="top: 92%;"></span>
      </div>

      <div class="form-card">
        <div class="top-bar"></div>

        <div class="logo-box">
          <img src="assets/images/logoFormulario.png" alt="ABC Travelling Logo" />
        </div>

        <div class="card-content">
          <h1>FORMULARIO<br>DE REGISTRO</h1>

          <p class="subtitle">
            Debe completar todo el formulario con la información original tal y como se encuentra reflejada
            en los documentos de identidad oficiales. <strong>Los campos con * son obligatorios</strong>
          </p>

          <form id="registroForm" class="registro-form" novalidate enctype="multipart/form-data">
            <div class="form-group">
              <label for="correo_principal">Correo*</label>
              <div class="field-wrap">
                <input type="email" id="correo_principal" name="correo_principal" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="nombre_comercial">Nombre Comercial / Business name*</label>
              <div class="field-wrap">
                <input type="text" id="nombre_comercial" name="nombre_comercial" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group upload-row">
              <label for="logotipo_empresa">Logotipo de Empresa</label>
              <div class="field-wrap">
                <div class="upload-box" id="uploadBox">
                  <input
                    type="file"
                    id="logotipo_empresa"
                    name="logotipo_empresa"
                    accept=".png,.jpg,.jpeg,.webp,.svg,.pdf"
                  />

                  <label for="logotipo_empresa" class="upload-label" id="uploadLabel">
                    <span class="upload-icon">↑</span>

                    <span class="upload-text">
                      <strong>Subir archivo</strong>
                      <span>PNG, JPG, WEBP, SVG o PDF</span>
                    </span>

                    <span class="upload-btn">Seleccionar</span>
                  </label>
                </div>

                <div class="file-preview" id="filePreview" hidden>
                  <div class="file-preview-inner">
                    <div class="preview-thumb" id="previewThumb"></div>

                    <div class="preview-meta">
                      <strong id="previewName"></strong>
                      <span id="previewType"></span>
                    </div>

                    <button type="button" class="remove-file-btn" id="removeFileBtn" aria-label="Quitar archivo">
                      ×
                    </button>
                  </div>
                </div>

                <small class="file-name" id="fileName">Ningún archivo seleccionado</small>
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="owner_name">Nombre Dueño o Gerente / Owner Name</label>
              <div class="field-wrap">
                <input type="text" id="owner_name" name="owner_name" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="correo_empresa">Correo / Email</label>
              <div class="field-wrap">
                <input type="email" id="correo_empresa" name="correo_empresa" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="telefono">Teléfono/Phone*</label>
              <div class="field-wrap">
                <input type="text" id="telefono" name="telefono" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="mercados">Mercados operados / Operated markets</label>
              <div class="field-wrap">
                <input type="text" id="mercados" name="mercados" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group business-model-row">
              <label>Modelo de Negocio / Business Model</label>
              <div class="field-wrap">
                <div class="checkbox-row">
                  <label class="check-item">
                    <input type="checkbox" name="modelo_negocio[]" value="B2C" />
                    <span>B2C</span>
                  </label>

                  <label class="check-item">
                    <input type="checkbox" name="modelo_negocio[]" value="B2B" />
                    <span>B2B</span>
                  </label>

                  <label class="check-item">
                    <input type="checkbox" name="modelo_negocio[]" value="B2C2B" />
                    <span>B2C2B</span>
                  </label>
                </div>
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group full">
              <label for="usuario_principal_nombre">
                Nombre y Apellido - Usuario Principal / First and Last Name - Main User
              </label>
              <div class="field-wrap">
                <input type="text" id="usuario_principal_nombre" name="usuario_principal_nombre" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group full">
              <label for="usuario_principal_correo">
                Correo - Usuario Principal / Email - Primary User
              </label>
              <div class="field-wrap">
                <input type="email" id="usuario_principal_correo" name="usuario_principal_correo" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group full">
              <label for="usuario_principal_telefono">
                Teléfono - Usuario Principal / Phone - Primary User
              </label>
              <div class="field-wrap">
                <input type="text" id="usuario_principal_telefono" name="usuario_principal_telefono" />
                <small class="error-text"></small>
              </div>
            </div>

            <div class="form-group full">
              <label>¿Desea recibir promociones y ofertas vía correo electrónico?*</label>
              <div class="field-wrap">
                <div class="checkbox-row promo-row">
                  <label class="check-item">
                    <input type="radio" name="promociones" value="si" />
                    <span>SI</span>
                  </label>

                  <label class="check-item">
                    <input type="radio" name="promociones" value="no" />
                    <span>NO</span>
                  </label>
                </div>
                <small class="error-text"></small>
              </div>
            </div>

            <div class="submit-wrap">
              <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">ENVIAR</span>
                <span class="btn-loader" aria-hidden="true"></span>
              </button>
            </div>

            <div class="form-status" id="formStatus"></div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/registro.js"></script>
</body>
</html>
